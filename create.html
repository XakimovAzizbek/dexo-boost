<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="create.css">

<body>
    <div class="background-blobs"></div>
    <div class="container">
        <header class="glass-card user-info">

        <div class="glass-card">

            <div class="input-group">
                <label>Kanal Usernamesi:</label>
                <input type="text" id="channel-username" placeholder="@username">
            </div>

            <div class="input-group">
                <label>Obunachilar soni:</label>
                <input type="number" id="subs-count" value="5" min="1">
            </div>

            <button id="btn-create">Vazifani Joylash</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">

        </a>
        <a href="create.html" class="nav-item active">

        </a>
