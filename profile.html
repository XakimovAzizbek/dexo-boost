<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXO BOOST - Profil</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>
    <div class="background-blobs"></div>
    <div class="container">
        
        <header class="glass-card page-header">
            <i class="fas fa-user-circle"></i>
            <h2>Foydalanuvchi Profili</h2>
        </header>

        <div class="glass-card profile-card">
            <div class="avatar-container">
                <img id="prof-avatar" src="https://via.placeholder.com/100" alt="Avatar">
                <div class="status-dot"></div>
            </div>
            
            <h1 id="prof-name">Yuklanmoqda...</h1>
            <p id="prof-username">@username</p>

            <div class="stats-badge">
                <i class="fas fa-id-badge"></i> ID: <span id="prof-id">0</span>
            </div>
        </div>

        <div class="glass-card balance-card">
            <div class="balance-title">Sizning balansingiz</div>
            <div class="balance-value">
                <i class="fas fa-coins text-amber"></i>
                <span id="prof-balance">0</span>
            </div>
            <p class="balance-footer">Vazifalar bajarib tangalaringizni ko'paytiring!</p>
        </div>

    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Asosiy</span>
        </a>
        <a href="earn.html" class="nav-item">
            <i class="fas fa-tasks"></i>
            <span>Bajarish</span>
        </a>
        <a href="create.html" class="nav-item">
            <i class="fas fa-plus-circle"></i>
            <span>Yaratish</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="fas fa-user"></i>
            <span>Profil</span>
        </a>
    </nav>

    <script src="profile.js"></script>
</body>
</html>
