<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOOST AI - Home</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <div class="background-blobs"></div>

    <div class="container">
        <header class="glass-card user-info">
            <div class="user-details">
                <img id="user-photo" src="https://via.placeholder.com/50" alt="Avatar">
                <div>
                    <h3 id="user-name">Yuklanmoqda...</h3>
                    <p id="user-id-text">ID: 0</p>
                </div>
            </div>
            <div class="balance-badge">
                <i class="fas fa-coins"></i>
                <span id="balance-amount">0</span>
            </div>
        </header>

        <section class="glass-card banner">
            <h1>BOOST AI</h1>
            <p>Haqiqiy obunachilar va tezkor rivojlanish!</p>
        </section>

        <div class="stats-grid">
            <div class="glass-card stat-item">
                <i class="fas fa-list-check" style="color: #3b82f6;"></i>
                <span>Mavjud vazifalar</span>
                <b id="active-tasks-count">0</b>
            </div>
            <div class="glass-card stat-item">
                <i class="fas fa-chart-line" style="color: #22c55e;"></i>
                <span>Sizning holatingiz</span>
                <b id="user-status">Faol</b>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Asosiy</span>
        </a>
        <a href="earn.html" class="nav-item">
            <i class="fas fa-tasks"></i>
            <span>Bajarish</span>
        </a>
        <a href="create.html" class="nav-item">
            <i class="fas fa-plus-circle"></i>
            <span>Yaratish</span>
        </a>
        <a href="profile.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>Profil</span>
        </a>
    </nav>

    <script type="module" src="home.js"></script>
</body>
</html>
