<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXO BOOST - Reklama</title>
    <link rel="stylesheet" href="home_reklama1.css">

    <!--
      AdsGram SDK ichida @tma.js/sdk ishlatadi.
      U launch parametrlarni 2 joydan qidiradi:
        1) window.Telegram.WebApp.initData  (Telegram WebView ichida)
        2) URL hash: #tgWebAppData=...      (brauzerda)

      window.Telegram.WebApp.initData read-only bo'lgani uchun o'zgartirib bo'lmaydi.
      Shuning uchun SDKlar yuklanishidan OLDIN URL hash ga yozamiz.
    -->

    <!-- 1. HASH GA FAKE TELEGRAM DATA (HAMMA SKRIPTDAN OLDIN) -->
    <script>
        (function () {
            // Allaqachon Telegram hash bo'lsa, hech narsa qilmaymiz
            if (window.location.hash.includes('tgWebAppData')) return;

            var fakeUser = JSON.stringify({
                id: 987654321,
                first_name: "WebUser",
                username: "webuser",
                language_code: "uz"
            });

            // initData formatida yozamiz (xuddi Telegram yuboradigan kabi)
            var fakeInitData =
                'user=' + encodeURIComponent(fakeUser) +
                '&auth_date=9999999999' +
                '&hash=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa';

            var fakeHash =
                'tgWebAppData=' + encodeURIComponent(fakeInitData) +
                '&tgWebAppVersion=7.7' +
                '&tgWebAppPlatform=android';

            // Sahifani qayta yuklamasdan hash ni o'zgartiramiz
            history.replaceState(
                null, '',
                window.location.pathname + window.location.search + '#' + fakeHash
            );
        })();
    </script>

    <!-- 2. TELEGRAM WEBAPP SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- 3. ADSGRAM SDK (endi hash da data bor) -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>
<body>
    <div class="reklama-box">
        <p id="status-text">Reklama yuklanmoqda...</p>
        <div class="loader" id="reklama-loader"></div>
        <div class="progress-container" id="progress-bar-wrap" style="display:none;">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p id="debug-text" style="color:red;font-size:12px;margin-top:10px;text-align:center;"></p>
    </div>

    <script src="home_reklama1.js"></script>
</body>
</html>
