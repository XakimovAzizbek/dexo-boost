<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEXO BOOST - Reklama</title>
    <link rel="stylesheet" href="home_reklama1.css">

    <!--
        telegram-web-app.js YUKLAMAYMIZ — u initData ni read-only qilib bo'sh qo'yadi.
        O'zimiz to'liq mock qilamiz, shunda AdsGram SDK uni o'qiydi.
    -->
    <script>
        (function () {
            // Haqiqiy Telegram muhitida bo'lsak — hech narsa qilmaymiz
            if (window.TelegramWebviewProxy || (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData)) {
                return;
            }

            var fakeInitData =
                'user=' + encodeURIComponent(JSON.stringify({
                    id: 987654321,
                    first_name: 'WebUser',
                    username: 'webuser',
                    language_code: 'uz',
                    allows_write_to_pm: true
                })) +
                '&auth_date=9999999999' +
                '&hash=aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa';

            // To'liq Telegram.WebApp mock
            window.Telegram = {
                WebApp: {
                    initData: fakeInitData,
                    initDataUnsafe: {
                        user: { id: 987654321, first_name: 'WebUser', username: 'webuser' },
                        auth_date: '9999999999',
                        hash: 'aaaaaaaaaa'
                    },
                    version: '7.7',
                    platform: 'android',
                    colorScheme: 'dark',
                    themeParams: {
                        bg_color: '#1c1c1e',
                        text_color: '#ffffff',
                        button_color: '#2481cc',
                        button_text_color: '#ffffff'
                    },
                    isExpanded: true,
                    viewportHeight: window.innerHeight,
                    viewportStableHeight: window.innerHeight,
                    headerColor: '#1c1c1e',
                    backgroundColor: '#1c1c1e',
                    isClosingConfirmationEnabled: false,
                    BackButton: {
                        isVisible: false,
                        show: function () {},
                        hide: function () {},
                        onClick: function () {}
                    },
                    MainButton: {
                        text: '',
                        color: '#2481cc',
                        textColor: '#ffffff',
                        isVisible: false,
                        isActive: true,
                        show: function () {},
                        hide: function () {},
                        onClick: function () {}
                    },
                    HapticFeedback: {
                        impactOccurred: function () {},
                        notificationOccurred: function () {},
                        selectionChanged: function () {}
                    },
                    ready: function () {},
                    expand: function () {},
                    close: function () {},
                    sendData: function () {},
                    openLink: function (url) { window.open(url, '_blank'); },
                    openTelegramLink: function (url) { window.open(url, '_blank'); },
                    showAlert: function (msg, cb) { alert(msg); if (cb) cb(); },
                    showConfirm: function (msg, cb) { var r = confirm(msg); if (cb) cb(r); }
                }
            };

            console.log('[MOCK] Telegram.WebApp mock qo\'yildi. initData:', fakeInitData.substring(0, 50) + '...');
        })();
    </script>

    <!-- AdsGram SDK — endi window.Telegram.WebApp tayyor -->
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
</head>
<body>
    <div class="reklama-box">
        <p id="status-text">Reklama yuklanmoqda...</p>
        <div class="loader" id="reklama-loader"></div>
        <div class="progress-container" id="progress-bar-wrap" style="display:none;">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <p id="debug-text" style="color:red;font-size:12px;margin-top:10px;text-align:center;"></p>
    </div>

    <script src="home_reklama1.js"></script>
</body>
</html>
